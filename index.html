<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Princess Math Quest — 1st Grade Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff0f7;
    --bg-2: #ffe1ee;
    --surface: rgba(255,255,255,0.85);
    --border: rgba(217,70,150,0.25);
    --text: #4a1f3d;
    --muted: #9e6b88;
    --primary: #ff6fbb;
    --primary-2: #c084fc;
    --accent: #ffb84a;
    --gold: #ffd24a;
    --gem: #b794f6;
    --danger: #ff5d7a;
    --success: #65e6a6;
    --purple: #c084fc;
    --pink: #ff6fbb;
    --shadow: 0 20px 60px rgba(217,70,150,0.18);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    color: var(--text);
    min-height: 100vh;
    background:
      radial-gradient(1000px 600px at 10% -10%, rgba(255,182,217,0.7), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(192,132,252,0.45), transparent 60%),
      radial-gradient(700px 500px at 50% 120%, rgba(255,212,107,0.4), transparent 60%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    background-attachment: fixed;
    overflow-x: hidden;
    font-size: 18px;
  }
  .app { max-width: 920px; margin: 0 auto; padding: 20px 18px 80px; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Fraunces', serif; font-weight: 900;
    font-size: 22px; letter-spacing: -0.01em;
    cursor: pointer;
  }
  .logo .star {
    font-size: 28px; line-height: 1;
    display: inline-block;
    filter: drop-shadow(0 4px 12px rgba(255,111,187,0.45));
  }

  /* HUD stats */
  .stats {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    padding: 7px 12px; border-radius: 999px;
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; gap: 6px;
    backdrop-filter: blur(10px);
    transition: transform 200ms, box-shadow 200ms;
  }
  .stat .num { font-variant-numeric: tabular-nums; }
  .stat.coin { color: var(--gold); border-color: rgba(255,210,74,0.35); }
  .stat.gem  { color: var(--gem);  border-color: rgba(183,148,246,0.35); }
  .stat.streak { color: var(--accent); border-color: rgba(255,184,74,0.35); }
  .stat.level { color: var(--primary); border-color: rgba(108,240,192,0.35); }
  .stat.bump { animation: stat-bump 500ms cubic-bezier(.16,1,.3,1); }
  @keyframes stat-bump {
    0% { transform: scale(1); }
    40% { transform: scale(1.18); box-shadow: 0 0 24px currentColor; }
    100% { transform: scale(1); }
  }

  .xp-bar {
    height: 6px; background: rgba(255,255,255,0.08); border-radius: 999px;
    overflow: hidden; margin-bottom: 16px; position: relative;
  }
  .xp-bar .fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--primary-2));
    transition: width 600ms cubic-bezier(.16,1,.3,1);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 26px;
    backdrop-filter: blur(20px);
    box-shadow: var(--shadow);
  }

  /* Home */
  h1.title {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(34px, 6.5vw, 56px);
    line-height: 1.05;
    margin: 4px 0 6px;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #d946a0 0%, #b347e6 60%, #ff8ec4 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tagline { color: var(--muted); font-size: 17px; margin-bottom: 18px; line-height: 1.5; }

  .nav-tabs {
    display: flex; gap: 6px; margin-bottom: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 5px; border-radius: 14px;
  }
  .nav-tab {
    flex: 1; cursor: pointer;
    background: transparent; color: var(--muted);
    border: 0; padding: 10px 12px; border-radius: 10px;
    font-family: inherit; font-weight: 700; font-size: 14px;
    transition: all 180ms;
  }
  .nav-tab.active {
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    color: #0a0e1f;
    box-shadow: 0 4px 16px rgba(108,240,192,0.25);
  }
  .nav-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.06); }
  .ws-badge {
    display: inline-block; min-width: 20px; padding: 2px 7px;
    margin-left: 4px; border-radius: 999px;
    background: var(--danger); color: #2a0913;
    font-size: 11px; font-weight: 800; vertical-align: middle;
  }
  .nav-tab.active .ws-badge { background: rgba(0,0,0,0.25); color: #fff; }

  /* ===== Scratchpad ===== */
  .notepad-btn {
    background: linear-gradient(135deg, #fff7d6, #ffe48a) !important;
    color: #5b3a00 !important;
    border-color: rgba(255,200,60,0.5) !important;
    font-weight: 800 !important;
  }
  .notepad-btn:hover { transform: translateY(-1px); }
  .scratch-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(8, 14, 32, 0.92);
    display: none; flex-direction: column;
    backdrop-filter: blur(6px);
  }
  .scratch-overlay.open { display: flex; }
  .scratch-bar {
    display: flex; gap: 8px; padding: 10px 12px;
    background: rgba(0,0,0,0.5);
    align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .scratch-bar .q {
    flex: 1 1 100%; color: #cfd9ff; font-size: 13px;
    line-height: 1.35; max-height: 60px; overflow: auto;
    padding: 6px 4px; opacity: 0.9;
  }
  .scratch-tool {
    border: none; cursor: pointer; padding: 10px 14px;
    border-radius: 10px; font-weight: 700; font-size: 14px;
    background: rgba(255,255,255,0.08); color: #fff;
    display: inline-flex; align-items: center; gap: 6px;
    min-height: 44px;
  }
  .scratch-tool.active { background: var(--accent); color: #0a0e1f; }
  .scratch-tool.danger { background: rgba(255,90,120,0.18); color: #ffb3c0; }
  .scratch-tool.close { background: rgba(255,255,255,0.15); margin-left: auto; }
  .scratch-swatches { display: inline-flex; gap: 6px; }
  .swatch {
    width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3); cursor: pointer;
  }
  .swatch.active { border-color: #fff; transform: scale(1.15); }
  .scratch-canvas-wrap {
    flex: 1; position: relative;
    background: #fffdf4;
    margin: 8px; border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #scratch-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    touch-action: none; cursor: crosshair;
    /* light grid */
    background-image:
      linear-gradient(to right, rgba(0,0,80,0.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(0,0,80,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  .scratch-hint {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); color: #fff; padding: 6px 12px;
    border-radius: 999px; font-size: 12px; pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
  }
  .scratch-hint.show { opacity: 1; }

  /* Dress-up closet */
  .princess-stage { display:flex; flex-direction:column; align-items:center; gap:8px; margin: 6px 0 18px; }
  .princess-avatar { background: linear-gradient(180deg, #fff7fc, #fde4f4); border-radius: 20px; padding: 8px; box-shadow: 0 8px 28px rgba(255,111,187,0.18); border: 2px solid rgba(217,70,150,0.18); }
  .princess-meta { text-align:center; color:#4a1f3d; font-weight:700; font-size:15px; }
  .closet-tabs { display:flex; gap:8px; overflow-x:auto; padding: 6px 2px 10px; margin-bottom:8px; scrollbar-width: none; }
  .closet-tabs::-webkit-scrollbar { display:none; }
  .closet-tab { flex:0 0 auto; padding:10px 14px; font-weight:800; font-size:14px; border-radius:999px; border:2px solid rgba(217,70,150,0.25); background:#fff; color:#7a1f5a; cursor:pointer; }
  .closet-tab.active { background: linear-gradient(135deg, #ff6fbb, #c084fc); color:#fff; border-color:#c084fc; box-shadow:0 4px 14px rgba(255,111,187,0.35); }
  .closet-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .closet-card { background:#fff; border:2px solid rgba(217,70,150,0.18); border-radius:16px; padding:10px; display:flex; flex-direction:column; align-items:center; gap:8px; box-shadow: 0 2px 10px rgba(255,111,187,0.10); }
  .closet-card.is-equipped { border-color:#c084fc; box-shadow: 0 4px 18px rgba(192,132,252,0.35); background: linear-gradient(180deg, #fff7fc, #fce7ff); }
  .closet-card .closet-thumb { width:100%; display:flex; justify-content:center; align-items:center; background: linear-gradient(180deg, #fff7fc, #fde4f4); border-radius:12px; padding:4px; }
  .closet-card .closet-thumb svg { display:block; }
  .closet-card .closet-name { font-size:13px; font-weight:800; color:#4a1f3d; text-align:center; }
  .closet-card .closet-status.equipped { font-size:13px; font-weight:800; color:#a26bf2; padding: 6px 10px; }
  .closet-card .btn.small { padding: 8px 12px; font-size: 13px; }
  .closet-card:not(.is-owned) { background: #fafafa; }
  .closet-card:not(.is-owned) .closet-thumb { opacity: 0.6; filter: grayscale(0.3); }

  /* Big, friendly speak buttons for a non-reader */
  .speak-btn {
    font-size: 18px !important;
    padding: 14px 20px !important;
    border-radius: 999px !important;
    border: 2px solid #ff6fbb !important;
    background: linear-gradient(135deg, #fff0f7, #fce7ff) !important;
    color: #7a1f5a !important;
    font-weight: 800 !important;
    box-shadow: 0 4px 14px rgba(255,111,187,0.25) !important;
  }
  .speak-btn:hover, .speak-btn:active {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(255,111,187,0.35) !important;
  }
  @keyframes speakPulse { 0%,100% { box-shadow: 0 4px 14px rgba(255,111,187,0.25);} 50% { box-shadow: 0 4px 22px rgba(255,111,187,0.55);} }
  .speak-btn:focus-visible { outline: 3px solid #c084fc; outline-offset: 2px; }

  /* ===== Princess theme overrides ===== */
  .nav-tabs { background: rgba(255,182,217,0.35) !important; border: 1px solid rgba(217,70,150,0.15); }
  .nav-tab { color: #7a3a60 !important; }
  .nav-tab.active {
    background: linear-gradient(135deg, #ff6fbb, #c084fc) !important;
    color: #fff !important;
    box-shadow: 0 4px 16px rgba(255,111,187,0.4);
  }
  .nav-tab:hover:not(.active) { background: rgba(255,255,255,0.5) !important; color: #4a1f3d !important; }
  .world {
    background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,235,247,0.7)) !important;
    border: 1px solid rgba(217,70,150,0.2) !important;
    box-shadow: 0 6px 20px rgba(217,70,150,0.1);
  }
  .world .desc { color: #8a4b76 !important; }
  .btn {
    background: linear-gradient(135deg, #ff6fbb, #c084fc) !important;
    color: #fff !important;
    box-shadow: 0 6px 18px rgba(255,111,187,0.35);
    font-size: 16px;
    padding: 14px 22px;
  }
  .btn.gold {
    background: linear-gradient(135deg, #ffd24a, #ff9eb5) !important;
    color: #4a1f3d !important;
  }
  .btn.ghost {
    background: rgba(255,255,255,0.7) !important;
    color: #4a1f3d !important;
    border: 1px solid rgba(217,70,150,0.25);
    box-shadow: none;
  }
  .btn.ghost:hover { background: #fff !important; }
  .choice {
    background: linear-gradient(180deg, #fff, #fff5fa) !important;
    border: 2px solid rgba(217,70,150,0.25) !important;
    color: #4a1f3d !important;
    font-size: 18px;
    font-weight: 700;
    min-height: 56px;
  }
  .choice:hover { background: linear-gradient(180deg, #fff8fc, #ffe9f3) !important; border-color: #ff6fbb !important; }
  .choice.correct { background: linear-gradient(180deg, #d4f7e0, #a8edc6) !important; border-color: #2e9967 !important; color: #1a5d3e !important; }
  .choice.wrong { background: linear-gradient(180deg, #ffe0e6, #ffc6d2) !important; border-color: #e63a5c !important; color: #7a1a2e !important; }
  .question {
    color: #4a1f3d !important;
    font-size: 22px !important;
    line-height: 1.4;
  }
  .qmeta { color: #9e6b88 !important; }
  .qmeta .chip {
    background: rgba(255,182,217,0.4) !important;
    border: 1px solid rgba(217,70,150,0.25) !important;
    color: #7a3a60 !important;
  }
  .xp-bar { background: rgba(255,182,217,0.35); }
  .powerup {
    background: rgba(255,255,255,0.8) !important;
    color: #4a1f3d !important;
    border: 1px solid rgba(217,70,150,0.25) !important;
  }
  .powerup .badge { background: #ff6fbb; color: #fff; }
  .powerup.notepad-btn {
    background: linear-gradient(135deg, #fff7d6, #ffe48a) !important;
    color: #5b3a00 !important;
  }
  .feedback {
    background: rgba(255,255,255,0.75) !important;
    border: 1px solid rgba(217,70,150,0.2) !important;
  }
  .feedback .head.ok { color: #1f8a5f !important; }
  .feedback .head.no { color: #c52f54 !important; }
  .feedback .explain { color: #4a1f3d !important; }
  .help-btn {
    background: rgba(255,255,255,0.85) !important;
    color: #4a1f3d !important;
    border: 1px solid rgba(217,70,150,0.3) !important;
  }
  .help-btn.yt { background: linear-gradient(135deg, #ff5d7a, #ff8aa0) !important; color: #fff !important; }
  .stat {
    background: rgba(255,255,255,0.75) !important;
    border: 1px solid rgba(217,70,150,0.2) !important;
    color: #4a1f3d !important;
  }
  .modal {
    background: linear-gradient(180deg, #fff, #fff0f7) !important;
    border: 2px solid rgba(217,70,150,0.3) !important;
    color: #4a1f3d !important;
  }
  .modal h2 {
    background: linear-gradient(135deg, #d946a0, #b347e6);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .footer { color: #9e6b88 !important; }
  .arcade-card { background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,235,247,0.7)) !important; border: 1px solid rgba(217,70,150,0.2) !important; color: #4a1f3d !important; }
  .arcade-card .game-name { color: #4a1f3d !important; }
  .arcade-card.locked { filter: grayscale(0.5) opacity(0.7); }
  .achievement {
    background: rgba(255,255,255,0.75) !important;
    border: 1px solid rgba(217,70,150,0.2) !important;
    color: #4a1f3d !important;
  }
  .achievement.locked { filter: grayscale(0.5) opacity(0.6); }
  .shop-item { background: rgba(255,255,255,0.85) !important; border: 1px solid rgba(217,70,150,0.25) !important; color: #4a1f3d !important; }
  .shop-item .desc { color: #8a4b76 !important; }
  /* Bigger text everywhere for first-graders */
  h1.title { font-family: 'Fraunces', serif; }
  .hero-title { font-size: clamp(30px, 5.5vw, 44px); }
  .hero-sub { font-size: 18px; line-height: 1.5; }

  .worlds {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px; margin-top: 14px;
  }
  .world {
    cursor: pointer;
    text-align: left;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px;
    color: var(--text);
    font-family: inherit;
    transition: transform 180ms cubic-bezier(.16,1,.3,1), border-color 180ms, background 180ms;
    position: relative; overflow: hidden;
  }
  .world::before {
    content: ""; position: absolute; inset: 0;
    background: var(--w-color, linear-gradient(135deg, var(--primary), var(--primary-2)));
    opacity: 0.12; transition: opacity 200ms;
    pointer-events: none; /* don't block child buttons like shop Buy */
  }
  .world:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.28); }
  .world:hover::before { opacity: 0.22; }
  .world .emoji { font-size: 28px; display: block; margin-bottom: 6px; position: relative; }
  .world .name { font-weight: 800; font-size: 16px; position: relative; }
  .world .desc { color: var(--muted); font-size: 13px; margin-top: 4px; position: relative; line-height: 1.4; }
  .world .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; position: relative; font-size: 12px; }
  .world .qcount { color: var(--muted); font-weight: 600; }
  .world .stars { color: var(--gold); font-weight: 700; }
  .world.mastered { border-color: var(--gold); box-shadow: 0 0 24px rgba(255,210,74,0.25); }

  .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
  .btn {
    appearance: none; border: 0; cursor: pointer;
    font-family: inherit; font-weight: 700; font-size: 15px;
    padding: 12px 22px; border-radius: 14px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 100%);
    color: #0a0e1f;
    box-shadow: 0 8px 24px rgba(108,240,192,0.28);
    transition: transform 120ms, box-shadow 120ms;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(108,240,192,0.36); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
  .btn.ghost {
    background: transparent; color: var(--text);
    border: 1px solid var(--border);
    box-shadow: none;
  }
  .btn.ghost:hover { background: rgba(255,255,255,0.06); }
  .btn.gold {
    background: linear-gradient(135deg, var(--gold), #ff9d4a);
    color: #2a1a00;
    box-shadow: 0 8px 24px rgba(255,210,74,0.3);
  }
  .btn.full { width: 100%; }

  /* Quiz */
  .progress-wrap {
    height: 8px; background: rgba(255,255,255,0.08); border-radius: 999px;
    overflow: hidden; margin-bottom: 14px;
  }
  .progress {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--primary-2));
    transition: width 300ms cubic-bezier(.16,1,.3,1);
  }
  .qmeta { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .topic-pill {
    background: rgba(255,255,255,0.08); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600;
  }
  .question {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(20px, 3.2vw, 28px);
    line-height: 1.25;
    margin: 6px 0 18px;
    letter-spacing: -0.01em;
  }

  .choices { display: grid; gap: 10px; }
  .choice {
    cursor: pointer; text-align: left;
    background: rgba(255,255,255,0.05);
    border: 2px solid var(--border);
    color: var(--text);
    padding: 14px 16px;
    border-radius: 14px;
    font-family: inherit; font-size: 16px; font-weight: 600;
    display: flex; align-items: center; gap: 12px;
    transition: all 180ms cubic-bezier(.16,1,.3,1);
  }
  .choice:hover:not(:disabled) { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); transform: translateX(2px); }
  .choice .letter {
    width: 30px; height: 30px; border-radius: 8px;
    background: rgba(255,255,255,0.08);
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; flex-shrink: 0;
  }
  .choice.correct { border-color: var(--success); background: rgba(101,230,166,0.15); }
  .choice.correct .letter { background: var(--success); color: #06281b; }
  .choice.wrong { border-color: var(--danger); background: rgba(255,93,122,0.15); }
  .choice.wrong .letter { background: var(--danger); color: #2a0913; }
  .choice.eliminated { opacity: 0.3; pointer-events: none; }
  .choice:disabled { cursor: not-allowed; }

  .feedback {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    display: none;
  }
  .feedback.show { display: block; animation: pop 280ms cubic-bezier(.16,1,.3,1); }
  .feedback .head {
    display: flex; align-items: center; gap: 10px;
    font-weight: 800; font-size: 17px; margin-bottom: 6px;
  }

function findLesson(question) {
  const text = question.q;
  const topic = question._topic;
  const sameTopic = LESSONS.filter(L => L.topic === topic && L.match.test(text));
  if (sameTopic.length > 0) return sameTopic[0];
  return LESSONS.find(L => L.match.test(text)) || null;
}
function buildYouTubeURL(query) {
  return "https://www.youtube.com/results?search_query=" + encodeURIComponent(query);
}

function xpForLevel(lv) { return 50 + (lv - 1) * 30; } // level 1→2 needs 50, then +30 each

// --- Text-to-speech so a non-reader can hear questions read aloud ---
let _speakVoice = null;
function _pickVoice() {
  if (!('speechSynthesis' in window)) return null;
  const voices = window.speechSynthesis.getVoices() || [];
  if (!voices.length) return null;
  // Prefer a clear English female-sounding voice
  const prefs = [
    v => /en[-_]US/i.test(v.lang) && /female|samantha|victoria|karen|allison|google.*us english/i.test(v.name),
    v => /en[-_]US/i.test(v.lang),
    v => /^en/i.test(v.lang),
    v => true
  ];
  for (const p of prefs) { const m = voices.find(p); if (m) return m; }
  return voices[0];
}
if ('speechSynthesis' in window) {
  try { window.speechSynthesis.onvoiceschanged = () => { _speakVoice = _pickVoice(); }; } catch(e){}
  // Try once on load too
  setTimeout(() => { _speakVoice = _pickVoice(); }, 200);
}
function speakable(text) {
  // Make the speech sound natural for a 1st grader
  return String(text)
    .replace(/\+/g, ' plus ')
    .replace(/−|–|—/g, ' minus ')
    .replace(/(?<=\d)\s*-\s*(?=\d)/g, ' minus ')
    .replace(/×|\*/g, ' times ')
    .replace(/÷|\//g, ' divided by ')
    .replace(/=/g, ' equals ')
    .replace(/\?/g, '?')
    .replace(/\s+/g, ' ')
    .trim();
}
function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.92;   // a touch slower for a 6-year-old
    u.pitch = 1.15;  // friendly, slightly higher
    u.volume = 1;
    if (!_speakVoice) _speakVoice = _pickVoice();
    if (_speakVoice) u.voice = _speakVoice;
    window.speechSynthesis.speak(u);
  } catch(e) { /* ignore */ }
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function bumpStat(cls) {
  const el = document.querySelector('.stat.' + cls);
  if (!el) return;
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
}

function spawnFloater(text, color, x, y) {
  const f = document.createElement('div');
  f.className = 'floater';
  f.style.left = x + 'px';
  f.style.top = y + 'px';
  f.style.color = color;
  f.textContent = text;
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 1200);
}

/* ============== Reward / level functions ============== */
function awardCoins(n, sourceEl = null) {
  state.coins += n;
  state.coinsEarned += n;
  bumpStat('coin');
  if (sourceEl) {
    const r = sourceEl.getBoundingClientRect();
    spawnFloater('+' + n + ' 🪙', '#ffd24a', r.left + r.width / 2, r.top);
  }
}
function awardGems(n, sourceEl = null) {
  state.gems += n;
  bumpStat('gem');
  if (sourceEl) {
    const r = sourceEl.getBoundingClientRect();
    spawnFloater('+' + n + ' 💎', '#b794f6', r.left + r.width / 2, r.top);
  }
}
function awardXP(n) {
  state.xp += n;
  while (state.xp >= xpForLevel(state.level)) {
    state.xp -= xpForLevel(state.level);
    state.level++;
    bumpStat('level');
    // Level-up reward
    const reward = 30 + state.level * 5;
    state.coins += reward;
    state.coinsEarned += reward;
    bumpStat('coin');
    showModal(`
      <div class="big-emoji">🎖️</div>
      <h2>LEVEL UP!</h2>
      <div class="desc">You reached <strong>Level ${state.level}</strong>!<br>+${reward} 🪙 bonus coins</div>
      <button class="btn" onclick="closeModal()">Keep Going</button>
    `);
  }
  updateHUD();
}

  if (newly.length === 0) return;
  // Award + show first new one as modal
  newly.forEach(a => { state.gems += 1; });
  bumpStat('gem');
  updateHUD();
  const a = newly[0];
  setTimeout(() => {

function weakSpotsCount() {

function renderWeakSpotsTab() {
  const entries = Object.values(state.weakSpots);
  if (entries.length === 0) {
    return `
      <h1 class="hero-title">🎯 Weak <span class="accent">Spots</span></h1>
      <p class="hero-sub">Questions you get wrong show up here — with the answer, a magic lesson, and a YouTube video that shows you how.</p>
      <div class="feedback show" style="display:block;">
        <div class="head ok">No weak spots yet — nice work.</div>
        <div class="explain">Play any practice round. Every miss lands here so you can study just what you don't know.</div>
      </div>
    `;
  }
  // Group by topic
  const byTopic = {};
  entries.forEach(e => { (byTopic[e.topic] = byTopic[e.topic] || []).push(e); });
  // Sort topics by total miss count desc
  const topicOrder = Object.keys(byTopic).sort((a, b) => {
    const sa = byTopic[a].reduce((s, e) => s + e.missCount, 0);
    const sb = byTopic[b].reduce((s, e) => s + e.missCount, 0);
    return sb - sa;
  });

  const totalMisses = entries.reduce((s, e) => s + e.missCount, 0);
  let html = `
    <h1 class="hero-title">🎯 Weak <span class="accent">Spots</span></h1>
    <p class="hero-sub">${entries.length} question${entries.length===1?'':'s'} to master — ${totalMisses} total miss${totalMisses===1?'':'es'}. Get each one right twice in a row to retire it.</p>
    <div class="row" style="margin-bottom:18px; flex-wrap:wrap; gap:10px;">
      <button class="btn full" id="btn-ws-quiz" style="flex:1; min-width:220px;">🎯 Practice my Weak Spots (${Math.min(entries.length, 10)} q)</button>
      <button class="btn ghost" id="btn-ws-clear">Clear list</button>
    </div>
  `;

  topicOrder.forEach(topic => {
    const list = byTopic[topic].sort((a, b) => b.missCount - a.missCount);
    html += `
      <h3 style="font-family:'Fraunces',serif; font-weight:800; margin:20px 0 10px; font-size:20px;">
        ${topicEmoji(topic)} ${topicName(topic)} <span style="opacity:0.6; font-weight:500; font-size:15px;">· ${list.length}</span>
      </h3>
    `;
    list.forEach(e => {
      const q = e.q;
      const masteryDots = e.hitCount === 0 ? '⚪⚪' : (e.hitCount === 1 ? '🟢⚪' : '🟢🟢');
      html += `
        <div class="feedback show" style="display:block; margin-bottom:10px;">
          <div class="head" style="color:var(--accent); display:flex; justify-content:space-between; align-items:flex-start; gap:12px;">
            <span>${q.q}</span>
            <span style="font-size:13px; opacity:0.8; white-space:nowrap;">missed ×${e.missCount} · ${masteryDots}</span>
          </div>
          <div class="explain"><strong>Answer: ${q.choices[q.correct]}.</strong><br>${q.explain}</div>
          ${renderHelpRow(q)}
        </div>
      `;
    });
  });
  return html;
}

function startWeakSpotsQuiz() {
  const entries = Object.values(state.weakSpots);
  if (entries.length === 0) return;
  // Sort by misses desc, take up to 10
  const sorted = entries.slice().sort((a, b) => b.missCount - a.missCount).slice(0, 10);
  const pool = sorted.map(e => ({ ...e.q, _topic: e.topic }));
  state.current = {
    worldId: 'weak', label: 'Weak Spots Quiz', queue: shuffle(pool), idx: 0,
    correct: 0, currentStreak: 0, missed: [],
    started: Date.now(),
    fastStartTime: 0, fastStreakCount: 0,
    eliminated: new Set(),
    skipped: [], freezeArmed: false
  };
  renderQuestion();
}

/* ============================================================
   QUIZ ENGINE
   ============================================================ */
function topicEmoji(t) { const w = WORLDS.find(x => x.id === t); return w ? w.emoji : '✨'; }
function topicName(t) { const w = WORLDS.find(x => x.id === t); return w ? w.name : 'Mixed'; }

function startQuiz(worldId) {
  let pool, label;
  if (worldId === 'mixed') {
    pool = [];
    Object.keys(QUESTIONS).forEach(k => QUESTIONS[k].forEach(q => pool.push({ ...q, _topic: k })));
    pool = shuffle(pool).slice(0, 15);
    label = 'Mixed Challenge';
  } else {
    pool = shuffle(QUESTIONS[worldId]).slice(0, 10).map(q => ({ ...q, _topic: worldId }));
    label = WORLDS.find(w => w.id === worldId).name;
  }
  state.current = {
    worldId, label, queue: pool, idx: 0,
    correct: 0, currentStreak: 0, missed: [],
    started: Date.now(),
    fastStartTime: 0, fastStreakCount: 0,
    eliminated: new Set(),
    skipped: [], freezeArmed: false
  };
  renderQuestion();
}

function renderQuestion() {
  const c = state.current;
  const q = c.queue[c.idx];
  const total = c.queue.length;
  const pct = (c.idx / total) * 100;

  screen.innerHTML = `
    <section class="card">
      <div class="qmeta">
        <span>Q ${c.idx + 1} / ${total}</span>
        <span class="topic-pill">${topicEmoji(q._topic)} ${topicName(q._topic)} ${c.currentStreak >= 2 ? '· 🔥 ' + c.currentStreak : ''}</span>
      </div>
      <div class="progress-wrap"><div class="progress" style="width:${pct}%"></div></div>

      <div class="question">${q.q}</div>
      <div class="row" style="margin:-6px 0 14px;justify-content:flex-start;gap:10px;flex-wrap:wrap;">
        <button class="btn ghost speak-btn" id="btn-speak" type="button" aria-label="Hear the question">🔊 Hear question</button>
        <button class="btn ghost speak-btn" id="btn-speak-choices" type="button" aria-label="Hear the answer choices">🎀 Hear choices</button>
      </div>

      <div class="choices" id="choices">
        ${q.choices.map((ch, i) => `
          <button class="choice" data-i="${i}" data-speak="${String(ch).replace(/"/g,'&quot;')}">
            <span class="letter">${String.fromCharCode(65 + i)}</span>
            <span>${ch}</span>
          </button>
        `).join('')}
      </div>

      <div class="powerups" id="powerups">
        <button class="powerup notepad-btn" id="btn-scratch">📝 Notepad${scratchHasInk(q.q)?'<span class="badge">✏️</span>':''}</button>
        <button class="powerup" data-pu="fifty" ${state.powerups.fifty<=0?'disabled':''}>✂️ 50/50 <span class="badge">${state.powerups.fifty}</span></button>
        <button class="powerup" data-pu="skip" ${state.powerups.skip<=0?'disabled':''}>⏭️ Skip <span class="badge">${state.powerups.skip}</span></button>
        <button class="powerup" data-pu="freeze" ${state.powerups.freeze<=0||c.freezeArmed?'disabled':''}>❄️ Freeze ${c.freezeArmed?'<span class="badge">ON</span>':'<span class="badge">'+state.powerups.freeze+'</span>'}</button>
      </div>

      <div class="feedback" id="feedback"></div>

      <div class="row" id="actions" style="display:none;">
        <button class="btn full" id="btn-next">${c.idx + 1 === total ? 'See Results →' : 'Next Question →'}</button>
      </div>

      <div class="row" style="margin-top:14px;">
        <button class="btn ghost" id="btn-quit">← Quit</button>
      </div>
    </section>
  `;

  document.getElementById('btn-quit').addEventListener('click', () => {
    if (confirm('Quit this quest?')) { if (window.speechSynthesis) window.speechSynthesis.cancel(); renderHome('practice'); }
  });
  document.getElementById('btn-scratch').addEventListener('click', () => openScratchpad(q.q));
  document.getElementById('btn-speak').addEventListener('click', () => speakText(speakable(q.q)));
  document.getElementById('btn-speak-choices').addEventListener('click', () => {
    const parts = q.choices.map((ch, i) => `${String.fromCharCode(65+i)}. ${speakable(ch)}`);
    speakText(parts.join('. '));
  });
  // Auto-speak the question once when it appears so she hears it without tapping
  setTimeout(() => speakText(speakable(q.q)), 250);

  const choices = screen.querySelectorAll('.choice');
  // Long-press a choice to hear it spoken (without selecting it)
  choices.forEach(btn => {
    let pressTimer = null;
    let longPressed = false;
    const startPress = () => {
      longPressed = false;
      pressTimer = setTimeout(() => {
        longPressed = true;
        const letter = String.fromCharCode(65 + parseInt(btn.dataset.i, 10));
        speakText(`${letter}. ${speakable(btn.dataset.speak||'')}`);
      }, 450);
    };
    const cancelPress = () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } };
    btn.addEventListener('mousedown', startPress);
    btn.addEventListener('touchstart', startPress, {passive:true});
    btn.addEventListener('mouseup', cancelPress);
    btn.addEventListener('mouseleave', cancelPress);
    btn.addEventListener('touchend', cancelPress);
    btn.addEventListener('touchcancel', cancelPress);
    btn.addEventListener('click', (e) => {
      if (longPressed) { e.preventDefault(); return; }
      const picked = parseInt(btn.dataset.i, 10);
      handleAnswer(picked, q, choices);
    });
  });

  // Power-ups
  screen.querySelectorAll('[data-pu]').forEach(btn => {
    btn.addEventListener('click', () => usePowerup(btn.dataset.pu, q, choices));
  });
}

function usePowerup(kind, q, choiceEls) {
  const c = state.current;
  if (kind === 'fifty') {
    if (state.powerups.fifty <= 0) return;
    state.powerups.fifty--;
    const wrongs = q.choices.map((_, i) => i).filter(i => i !== q.correct && !c.eliminated.has(i));
    const removeCount = Math.min(2, wrongs.length);
    shuffle(wrongs).slice(0, removeCount).forEach(i => {
      c.eliminated.add(i);
      choiceEls[i].classList.add('eliminated');
    });
  } else if (kind === 'skip') {
    if (state.powerups.skip <= 0) return;
    state.powerups.skip--;
    c.skipped.push(q);
    showFlash('⏭️ Skipped', 500);
    setTimeout(() => {
      c.idx++;
      if (c.idx >= c.queue.length) renderResults(); else renderQuestion();
    }, 350);
  } else if (kind === 'freeze') {
    if (state.powerups.freeze <= 0) return;
    state.powerups.freeze--;
    c.freezeArmed = true;
    showFlash('❄️ Freeze ON', 500);
  }
  // re-render powerup row counts
  const row = document.getElementById('powerups');
  if (row) {
    const fbtn = row.querySelector('[data-pu="fifty"]');
    const sbtn = row.querySelector('[data-pu="skip"]');
    const zbtn = row.querySelector('[data-pu="freeze"]');
    if (fbtn) { fbtn.disabled = state.powerups.fifty<=0; fbtn.querySelector('.badge').textContent = state.powerups.fifty; }
    if (sbtn) { sbtn.disabled = state.powerups.skip<=0;  sbtn.querySelector('.badge').textContent = state.powerups.skip; }
    if (zbtn) { zbtn.disabled = state.powerups.freeze<=0||c.freezeArmed;
                zbtn.innerHTML = '❄️ Freeze ' + (c.freezeArmed?'<span class="badge">ON</span>':'<span class="badge">'+state.powerups.freeze+'</span>'); }
  }
}

function handleAnswer(picked, q, choiceEls) {
  const c = state.current;
  choiceEls.forEach(el => el.disabled = true);
  const correctIndex = q.correct;
  choiceEls[correctIndex].classList.add('correct');
  const isRight = picked === correctIndex;
  if (!isRight) {
    choiceEls[picked].classList.add('wrong');
    choiceEls[picked].classList.add('shake');
  }

  const fb = document.getElementById('feedback');
  fb.classList.add('show');

  let rewardHTML = '';
  if (isRight) {
    c.correct++;
    c.currentStreak++;
    state.totalCorrect++;
    if (c.currentStreak > state.bestStreak) state.bestStreak = c.currentStreak;

    // Speed flag
    if (c.currentStreak === 1) c.fastStartTime = Date.now();
    if (c.currentStreak >= 5 && (Date.now() - c.fastStartTime) < 30000) state.speedFlag = true;

    // Coin reward with streak multiplier
    let mult = 1;
    if (c.currentStreak >= 10) mult = 5;
    else if (c.currentStreak >= 5) mult = 3;
    else if (c.currentStreak >= 3) mult = 2;
    const baseCoins = 5;
    const coinsEarned = baseCoins * mult;
    awardCoins(coinsEarned, choiceEls[correctIndex]);
    awardXP(10);

    // Weak-spot mastery: if this was previously missed, mark a hit. After 2 hits, retire it.
    const wsKey = q.q;
    if (state.weakSpots[wsKey]) {
      state.weakSpots[wsKey].hitCount = (state.weakSpots[wsKey].hitCount || 0) + 1;
      if (state.weakSpots[wsKey].hitCount >= 2) delete state.weakSpots[wsKey];
    }

    rewardHTML = `
      <div class="reward-row">
        <span class="reward-pill">+${coinsEarned} 🪙${mult>1?' ×'+mult:''}</span>
        <span class="reward-pill xp">+10 XP</span>
        ${c.currentStreak>=3 ? '<span class="reward-pill">🔥 '+c.currentStreak+'-streak</span>' : ''}
      </div>
    `;

    let head = '✅ Nailed it.';
    if (c.currentStreak === 3) { head = '🔥 3-in-a-row!'; showFlash('🔥 STREAK!'); }
    else if (c.currentStreak === 5) { head = '🚀 5x — on fire!'; showFlash('🚀 ×3 COINS'); }
    else if (c.currentStreak === 10) { head = '💎 10x — UNSTOPPABLE!'; showFlash('💎 ×5 COINS'); }
    else if (c.currentStreak > 10) { head = `💎 ${c.currentStreak}-in-a-row!`; }

    fb.innerHTML = `
      <div class="head ok">${head}</div>
      ${rewardHTML}
      <div class="explain">${q.explain}</div>
      ${renderHelpRow(q)}
    `;
  } else {
    if (c.freezeArmed) {
      c.freezeArmed = false;
      showFlash('❄️ Streak saved!');
    } else {
      c.currentStreak = 0;
    }
    c.missed.push(q);
    // Track weak spot
    const wsKey = q.q;
    if (!state.weakSpots[wsKey]) {
      state.weakSpots[wsKey] = { q: q, topic: q._topic, missCount: 0, hitCount: 0 };
    }
    state.weakSpots[wsKey].missCount++;
    state.weakSpots[wsKey].hitCount = 0; // reset mastery on a fresh miss
    fb.innerHTML = `
      <div class="head no">Not quite — here's how:</div>
      <div class="explain"><strong>Correct: ${q.choices[correctIndex]}.</strong><br>${q.explain}</div>
      ${renderHelpRow(q)}
    `;
  }

  wireHelpButtons(fb);
  document.getElementById('actions').style.display = 'flex';
  document.getElementById('btn-next').addEventListener('click', () => {
    c.idx++;
    if (c.idx >= c.queue.length) renderResults();
    else { c.eliminated = new Set(); renderQuestion(); }
  });
  updateHUD();
  checkAchievements();
}

function renderHelpRow(question) {
  const lesson = findLesson(question);
  const fallbackQuery = (topicName(question._topic) + " 1st grade math").toLowerCase();
  const ytQuery = lesson ? lesson.ytQuery : fallbackQuery;
  const ytURL = buildYouTubeURL(ytQuery);
  const lessonId = "lesson-" + Math.random().toString(36).slice(2, 9);
  return `
    <div class="help-row">
      <a class="help-btn yt" href="${ytURL}" target="_blank" rel="noopener">📺 Watch on YouTube</a>
      <button class="help-btn show" data-lesson-target="${lessonId}">✏️ Show me how</button>
    </div>
    ${lesson ? `
      <div class="lesson" id="${lessonId}">
        <h4>${lesson.label} — step by step</h4>
        <ol>${lesson.lesson.map(s => `<li>${s}</li>`).join('')}</ol>
        ${lesson.takeaway ? `<div class="takeaway">💡 ${lesson.takeaway}</div>` : ''}
      </div>
    ` : `
      <div class="lesson" id="${lessonId}">
        <h4>How to solve this</h4>
        <ol><li>${question.explain}</li></ol>
        <div class="takeaway">💡 Tap "Watch on YouTube" for video help.</div>
      </div>
    `}
  `;
}
function wireHelpButtons(rootEl) {
  rootEl.querySelectorAll('[data-lesson-target]').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.getElementById(btn.dataset.lessonTarget);
      if (target) {
        target.classList.toggle('open');
        btn.textContent = target.classList.contains('open') ? '✏️ Hide steps' : '✏️ Show me how';
      }
    });
  });
}

function renderResults() {
  const c = state.current;
  const total = c.queue.length;
  const correct = c.correct;
  const pct = Math.round((correct / total) * 100);

  // Track best for world / mixed
  if (c.worldId === 'mixed') state.mixedBest = Math.max(state.mixedBest, pct);
  else state.worldBest[c.worldId] = Math.max(state.worldBest[c.worldId] || 0, pct);

  // Bonus rewards
  let bonusCoins = 0, bonusGems = 0;
  if (pct === 100) { bonusCoins = 50; bonusGems = 2; state.perfectRounds++; }
  else if (pct >= 90) { bonusCoins = 30; bonusGems = 1; }
  else if (pct >= 75) { bonusCoins = 15; }
  else if (pct >= 50) { bonusCoins = 5; }
  if (bonusCoins) awardCoins(bonusCoins);
  if (bonusGems) awardGems(bonusGems);

  let title, sub, badge;
  if (pct === 100) { title = "PERFECT"; sub = "Every question right. Test-day ready."; badge = '🏆🌟⭐⭐⭐'; }
  else if (pct >= 85) { title = "EXCELLENT"; sub = "Crushing it. Run again to lock it in."; badge = '⭐⭐⭐'; }
  else if (pct >= 70) { title = "GREAT WORK"; sub = "Solid round. Review the misses below."; badge = '⭐⭐'; }
  else if (pct >= 50) { title = "GOOD START"; sub = "On the path. Run it again."; badge = '⭐'; }
  else { title = "KEEP GOING"; sub = "Review carefully and retry."; badge = '💪'; }

  const missedHtml = c.missed.length === 0
    ? `<div class="feedback show" style="display:block; margin-top:14px;">
         <div class="head ok">🎉 No mistakes to review!</div>
         <div class="explain">Perfect run.</div>
       </div>`
    : `
      <h3 style="font-family:'Fraunces',serif; font-weight:800; margin:20px 0 10px; font-size:20px;">📚 Review (${c.missed.length})</h3>
      ${c.missed.map(q => `
        <div class="feedback show" style="display:block; margin-bottom:10px;">
          <div class="head" style="color:var(--accent)">${topicEmoji(q._topic)} ${q.q}</div>
          <div class="explain"><strong>Answer: ${q.choices[q.correct]}.</strong><br>${q.explain}</div>
          ${renderHelpRow(q)}
        </div>
      `).join('')}
    `;

  screen.innerHTML = `
    <section class="card">
      <div class="result-hero">
        <div class="badge-bar">${badge}</div>
        <div style="font-family:'Fraunces',serif; font-weight:800; font-size:22px; letter-spacing:0.04em;">${title}</div>
        <div class="big">${pct}%</div>
        <div class="sub">${sub}</div>
      </div>

      <div class="result-grid">
        <div class="result-cell"><div class="v">${correct}/${total}</div><div class="l">Correct</div></div>
        <div class="result-cell"><div class="v">🪙 ${bonusCoins}</div><div class="l">Bonus</div></div>
        <div class="result-cell"><div class="v">💎 ${bonusGems}</div><div class="l">Gems</div></div>
        <div class="result-cell"><div class="v">🔥 ${state.bestStreak}</div><div class="l">Best</div></div>
      </div>

      ${missedHtml}

      <div class="row" style="flex-wrap:wrap; gap:8px;">
        <button class="btn" id="btn-again">🔁 Try Again</button>
        ${weakSpotsCount() ? `<button class="btn gold" id="btn-weak">🎯 Study Weak Spots (${weakSpotsCount()})</button>` : ''}
        <button class="btn ghost" id="btn-arcade">🎮 Arcade</button>
        <button class="btn ghost" id="btn-home">🏠 Home</button>
      </div>
    </section>
  `;

  wireHelpButtons(screen);
  document.getElementById('btn-again').addEventListener('click', () => startQuiz(c.worldId));
  document.getElementById('btn-arcade').addEventListener('click', () => renderHome('arcade'));
  document.getElementById('btn-home').addEventListener('click', () => renderHome('practice'));
  const weakBtn = document.getElementById('btn-weak');
  if (weakBtn) weakBtn.addEventListener('click', () => renderHome('weak'));
  updateHUD();
  checkAchievements();
}

// Resolve a "color token" (rainbow, galaxy, cotton, candycane, diamond, or a hex)
function resolveFill(token, gradId) {
  if (token === 'rainbow')    return `url(#${gradId||'gradRainbow'})`;
  if (token === 'galaxy')     return `url(#${gradId||'gradGalaxy'})`;
  if (token === 'cotton')     return `url(#${gradId||'gradCotton'})`;
  if (token === 'candycane')  return `url(#${gradId||'gradCandy'})`;
  if (token === 'diamond')    return `url(#${gradId||'gradDiamond'})`;
  return token;
}

let _closetSlot = 'body';
function wirePrincessTab() {
  const tabsEl = document.getElementById('closet-tabs');
  // If saved slot doesn't exist in new SLOTS, reset to first
  if (!SLOTS.some(s => s.id === _closetSlot)) _closetSlot = SLOTS[0].id;
  function setSlot(slot) {
    _closetSlot = slot;
    tabsEl.querySelectorAll('.closet-tab').forEach(b => b.classList.toggle('active', b.dataset.slot === slot));
    renderCloset(slot);
  }
  tabsEl.querySelectorAll('.closet-tab').forEach(b => {
    b.addEventListener('click', () => setSlot(b.dataset.slot));
  });
  setSlot(_closetSlot);
}
function renderCloset(slot) {
  const grid = document.getElementById('closet-grid');
  if (!grid) return;
  const items = WARDROBE.filter(i => i.slot === slot);
  grid.innerHTML = items.map(it => {
    const owned = state.wardrobe.has(it.id);
    const equipped = state.outfit[it.slot] === it.id;
    const previewOutfit = Object.assign({}, state.outfit, { [it.slot]: it.id });
    const preview = unicornSVG(previewOutfit, {size: 130, bg:false});
    const action = owned
      ? (equipped ? `<div class="closet-status equipped">✨ Wearing</div>` : `<button class="btn small wear-btn" data-wear="${it.id}">Wear it</button>`)
      : `<button class="btn gold small buy-item-btn" data-buyitem="${it.id}" data-cost="${it.cost}">🪙 ${it.cost}</button>`;
    return `<div class="closet-card ${equipped?'is-equipped':''} ${owned?'is-owned':''}">
      <div class="closet-thumb">${preview}</div>
      <div class="closet-name">${it.emoji} ${it.name}</div>
      ${action}
    </div>`;
  }).join('');
  grid.querySelectorAll('[data-wear]').forEach(b => {
    b.addEventListener('click', () => {
      const it = wardrobeItem(b.dataset.wear);
      state.outfit[it.slot] = it.id;
      saveState && saveState();
      renderHome('princess');
    });
  });
  grid.querySelectorAll('[data-buyitem]').forEach(b => {
    b.addEventListener('click', () => {
      const it = wardrobeItem(b.dataset.buyitem);
      const cost = it.cost;
      if (state.coins < cost) { showFlash('Not enough 🪙', 900); return; }
      state.coins -= cost;
      state.wardrobe.add(it.id);
      state.outfit[it.slot] = it.id;
      bumpStat('coin'); updateHUD();
      const r = b.getBoundingClientRect();
      spawnFloater('✨ New ' + it.name, '#ff6fbb', r.left + r.width/2, r.top);
      saveState && saveState();
      renderHome('princess');
    });
  });
}

/* =================== MINI-GAME 1: NUMBER BREAKER =================== */
function startBreaker() {
  gameShell('Crystal Crush', `
    <div class="left"><span>SCORE: <span id="g-score">0</span></span></div>
    <div class="right"><span>LIVES: <span id="g-lives">3</span></span></div>
  `, 'Break bricks. Their numbers add to your score. Don\'t lose the ball!');

  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  let score = 0, lives = 3, running = true;

  const paddle = { x: W/2 - 50, y: H - 30, w: 100, h: 12, speed: 8 };
  const ball = { x: W/2, y: H - 50, dx: 4, dy: -4, r: 8 };
  const bricks = [];
  const cols = 8, rows = 5, bw = 60, bh = 22, pad = 6, top = 50, left = (W - (cols * (bw + pad) - pad)) / 2;
  const colors = ['#6cf0c0','#4ad6ff','#c084fc','#ffb84a','#f472b6'];
  for (let r = 0; r < rows; r++) {
    for (let cc = 0; cc < cols; cc++) {
      bricks.push({
        x: left + cc * (bw + pad), y: top + r * (bh + pad),
        w: bw, h: bh, hit: false,
        val: Math.floor(Math.random() * 9) + 1,
        color: colors[r]
      });
    }
  }

  const keys = {};
  const onKey = (e, down) => { if (e.key === 'ArrowLeft' || e.key === 'a') keys.l = down; if (e.key === 'ArrowRight' || e.key === 'd') keys.r = down; };
  const kd = e => onKey(e, true), ku = e => onKey(e, false);
  window.addEventListener('keydown', kd); window.addEventListener('keyup', ku);
  let mouseX = null;
  const mm = e => {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width;
    const cx = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
    mouseX = cx * sx;
  };
  canvas.addEventListener('mousemove', mm);
  canvas.addEventListener('touchmove', e => { mm(e); e.preventDefault(); });

  function reset() { ball.x = W/2; ball.y = H - 50; ball.dx = (Math.random()<.5?-1:1)*4; ball.dy = -4; }

  function step() {
    if (!running) return;
    ctx.fillStyle = '#08091a';
    ctx.fillRect(0, 0, W, H);

    // paddle move
    if (keys.l) paddle.x -= paddle.speed;
    if (keys.r) paddle.x += paddle.speed;
    if (mouseX !== null) paddle.x = mouseX - paddle.w/2;
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

    // ball move
    ball.x += ball.dx; ball.y += ball.dy;
    if (ball.x < ball.r || ball.x > W - ball.r) ball.dx *= -1;
    if (ball.y < ball.r) ball.dy *= -1;
    if (ball.y > H + 20) {
      lives--;
      document.getElementById('g-lives').textContent = lives;
      if (lives <= 0) {
        running = false;
        const earn = Math.floor(score / 5);
        gameOverOverlay({ title: 'GAME OVER', msg: `Score: ${score}`, coinsEarned: earn, onRestart: startBreaker });
        return;
      }
      reset();
    }
    // paddle collision
    if (ball.y + ball.r >= paddle.y && ball.y < paddle.y + paddle.h &&
        ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
      ball.dy = -Math.abs(ball.dy);
      ball.dx = ((ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2)) * 5;
    }
    // brick collision
    for (const b of bricks) {
      if (b.hit) continue;
      if (ball.x > b.x && ball.x < b.x + b.w && ball.y > b.y && ball.y < b.y + b.h) {
        b.hit = true;
        score += b.val;
        document.getElementById('g-score').textContent = score;
        ball.dy *= -1;
        break;
      }
    }
    // win
    if (bricks.every(b => b.hit)) {
      running = false;
      const earn = 100 + Math.floor(score / 4);
      gameOverOverlay({ title: 'YOU WIN!', msg: `Score: ${score}`, coinsEarned: earn, onRestart: startBreaker });
      return;
    }

    // draw bricks
    bricks.forEach(b => {
      if (b.hit) return;
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.fillStyle = '#0a0e1f';
      ctx.font = 'bold 14px "Plus Jakarta Sans", sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(b.val, b.x + b.w/2, b.y + b.h/2);
    });
    // draw paddle
    ctx.fillStyle = '#6cf0c0';
    ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
    // ball
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd24a';
    ctx.fill();

    requestAnimationFrame(step);
  }
  step();

  window._gameStop = () => {
    running = false;
    window.removeEventListener('keydown', kd);
    window.removeEventListener('keyup', ku);
  };
}

function startRunner() {
  let qIdx = 0;
  let currentQ = null;
  let score = 0, missed = 0, running = true;

  function pickQuestion() {
    const all = [];
    Object.keys(QUESTIONS).forEach(k => QUESTIONS[k].forEach(q => all.push(q)));
    const q = all[Math.floor(Math.random() * all.length)];
    currentQ = q;
  }
  pickQuestion();

  gameShell('Unicorn Run', `
    <div class="left"><span>SCORE: <span id="g-score">0</span></span></div>
    <div class="right"><span>MISS: <span id="g-miss">0</span>/3</span></div>
  `, `<div id="game-question"><strong>Q:</strong> ${currentQ.q}</div>`);

  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const player = { x: W/2, y: H - 60, w: 36, h: 36, speed: 6 };
  const items = []; // falling answers: {x,y,text,correct,vy}
  let spawnTimer = 0;

  const keys = {};
  const kd = e => { if (e.key === 'ArrowLeft' || e.key === 'a') keys.l = true; if (e.key === 'ArrowRight' || e.key === 'd') keys.r = true; };
  const ku = e => { if (e.key === 'ArrowLeft' || e.key === 'a') keys.l = false; if (e.key === 'ArrowRight' || e.key === 'd') keys.r = false; };
  window.addEventListener('keydown', kd); window.addEventListener('keyup', ku);
  let pointerX = null;
  const mm = e => {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width;
    const cx = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
    pointerX = cx * sx;
  };
  canvas.addEventListener('mousemove', mm);
  canvas.addEventListener('touchmove', e => { mm(e); e.preventDefault(); });

  function spawn() {
    const correctAns = currentQ.choices[currentQ.correct];
    const all = currentQ.choices.slice();
    const txt = all[Math.floor(Math.random() * all.length)];
    items.push({
      x: 30 + Math.random() * (W - 60), y: -30,
      text: txt, correct: txt === correctAns,
      vy: 2 + Math.random() * 1.5 + score * 0.02
    });
  }

  function step() {
    if (!running) return;
    ctx.fillStyle = '#08091a';
    ctx.fillRect(0, 0, W, H);

    // player
    if (keys.l) player.x -= player.speed;
    if (keys.r) player.x += player.speed;
    if (pointerX !== null) {
      const tgt = pointerX;
      if (Math.abs(tgt - player.x) > 2) player.x += Math.sign(tgt - player.x) * Math.min(player.speed * 1.3, Math.abs(tgt - player.x));
    }
    player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));

    // spawn
    spawnTimer--;
    if (spawnTimer <= 0) { spawn(); spawnTimer = 50 - Math.min(30, score); }

    // items
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      it.y += it.vy;
      // collision
      if (it.y + 14 > player.y - player.h/2 && it.y - 14 < player.y + player.h/2 &&
          Math.abs(it.x - player.x) < player.w/2 + 30) {
        if (it.correct) {
          score += 5;
          document.getElementById('g-score').textContent = score;
          spawnFloater('+5', '#65e6a6', canvas.getBoundingClientRect().left + it.x, canvas.getBoundingClientRect().top + it.y);
          // new question
          pickQuestion();
          document.getElementById('game-question').innerHTML = `<strong>Q:</strong> ${currentQ.q}`;
          items.splice(i, 1);
          continue;
        } else {
          missed++;
          document.getElementById('g-miss').textContent = missed;
          items.splice(i, 1);
          if (missed >= 3) {
            running = false;
            const earn = score * 2;
            gameOverOverlay({ title: 'GAME OVER', msg: `Score: ${score}`, coinsEarned: earn, onRestart: startRunner });
            return;
          }
          continue;
        }
      }
      if (it.y > H + 30) items.splice(i, 1);
    }

    // draw items
    items.forEach(it => {
      ctx.fillStyle = it.correct ? 'rgba(108,240,192,0.2)' : 'rgba(255,93,122,0.18)';
      ctx.strokeStyle = it.correct ? '#6cf0c0' : '#ff5d7a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(it.x - 32, it.y - 16, 64, 32, 8) : ctx.rect(it.x - 32, it.y - 16, 64, 32);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px "Plus Jakarta Sans", sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(it.text.length > 8 ? it.text.slice(0,8) : it.text, it.x, it.y);
    });

    // draw player
    ctx.fillStyle = '#4ad6ff';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.w/2, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#0a0e1f';
    ctx.font = 'bold 18px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🎯', player.x, player.y);

    requestAnimationFrame(step);
  }
  step();

  window._gameStop = () => {
    running = false;
    window.removeEventListener('keydown', kd);
    window.removeEventListener('keyup', ku);
  };
}

/* =================== MINI-GAME 3: MATH SNAKE =================== */
function startSnake() {
  // Generate a small math problem with 4 answer options on the board
  function genProblem() {
    // First-grade friendly: add to 20, subtract from 20
    let a, b, op, answer;
    if (Math.random() < 0.55) {
      // Addition with answers up to 20
      a = Math.floor(Math.random() * 10) + 1;
      b = Math.floor(Math.random() * (20 - a)) + 1;
      op = '+'; answer = a + b;
    } else {
      // Subtraction with positive answers
      a = Math.floor(Math.random() * 16) + 4;
      b = Math.floor(Math.random() * a) + 1;
      op = '−'; answer = a - b;
    }
    const wrongs = new Set();
    while (wrongs.size < 3) {
      const delta = Math.floor(Math.random() * 5) - 2; // ±2 range
      const w = answer + (delta === 0 ? 3 : delta);
      if (w !== answer && w >= 0 && w <= 25) wrongs.add(w);
    }
    return { q: `${a} ${op} ${b}`, answer, wrongs: Array.from(wrongs) };
  }

  let problem = genProblem();
  let score = 0, running = true;

  gameShell('Rainbow Snake', `
    <div class="left"><span>LEN: <span id="g-len">3</span></span></div>
    <div class="right"><span>SCORE: <span id="g-score">0</span></span></div>
  `, `<div id="game-question"><strong>Eat:</strong> ${problem.q} = ?</div>`);

  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  const cell = 25;
  const cols = Math.floor(canvas.width / cell);
  const rows = Math.floor(canvas.height / cell);

  let snake = [{x: 5, y: 5}, {x: 4, y: 5}, {x: 3, y: 5}];
  let dir = {x: 1, y: 0};
  let nextDir = dir;
  let foods = [];
  function placeFoods() {
    foods = [];
    const positions = new Set(snake.map(s => s.x + ',' + s.y));
    function rndPos() {
      let p;
      do { p = { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) }; }
      while (positions.has(p.x + ',' + p.y));
      positions.add(p.x + ',' + p.y);
      return p;
    }
    foods.push({ ...rndPos(), val: problem.answer, correct: true });
    problem.wrongs.forEach(w => foods.push({ ...rndPos(), val: w, correct: false }));
  }
  placeFoods();

  const kd = e => {
    if (e.key === 'ArrowUp' || e.key === 'w')    { if (dir.y !== 1)  nextDir = {x:0,y:-1}; }
    if (e.key === 'ArrowDown' || e.key === 's')  { if (dir.y !== -1) nextDir = {x:0,y:1}; }
    if (e.key === 'ArrowLeft' || e.key === 'a')  { if (dir.x !== 1)  nextDir = {x:-1,y:0}; }
    if (e.key === 'ArrowRight' || e.key === 'd') { if (dir.x !== -1) nextDir = {x:1,y:0}; }
  };
  window.addEventListener('keydown', kd);
  // Touch: swipe
  let tStart = null;
  canvas.addEventListener('touchstart', e => { tStart = e.touches[0]; e.preventDefault(); });
  canvas.addEventListener('touchend', e => {
    if (!tStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - tStart.clientX;
    const dy = t.clientY - tStart.clientY;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > 20 && dir.x !== -1) nextDir = {x:1,y:0};
      else if (dx < -20 && dir.x !== 1) nextDir = {x:-1,y:0};
    } else {
      if (dy > 20 && dir.y !== -1) nextDir = {x:0,y:1};
      else if (dy < -20 && dir.y !== 1) nextDir = {x:0,y:-1};
    }
    tStart = null; e.preventDefault();
  });

  let last = 0;
  const speed = 130;
  function loop(ts) {
    if (!running) return;
    if (ts - last > speed) {
      last = ts;
      tick();
    }
    draw();
    requestAnimationFrame(loop);
  }

  function tick() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    // wall
    if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) return endGame();
    // self
    if (snake.some(s => s.x === head.x && s.y === head.y)) return endGame();
    snake.unshift(head);
    // food check
    let ate = false;
    for (let i = 0; i < foods.length; i++) {
      const f = foods[i];
      if (f.x === head.x && f.y === head.y) {
        if (f.correct) {
          score += 10;
          ate = true;
          problem = genProblem();
          document.getElementById('game-question').innerHTML = `<strong>Eat:</strong> ${problem.q} = ?`;
          placeFoods();
        } else {
          // wrong food = lose 2 segments + new problem
          for (let k = 0; k < 2 && snake.length > 1; k++) snake.pop();
          score = Math.max(0, score - 5);
          problem = genProblem();
          document.getElementById('game-question').innerHTML = `<strong>Eat:</strong> ${problem.q} = ?`;
          placeFoods();
        }
        break;
      }
    }
    if (!ate) snake.pop();
    document.getElementById('g-len').textContent = snake.length;
    document.getElementById('g-score').textContent = score;
    if (snake.length === 0) endGame();
  }

  function endGame() {
    running = false;
    const earn = score * 3;
    gameOverOverlay({ title: 'GAME OVER', msg: `Length: ${snake.length} • Score: ${score}`, coinsEarned: earn, onRestart: startSnake });
  }

  function draw() {
    ctx.fillStyle = '#08091a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // grid
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= cols; i++) { ctx.beginPath(); ctx.moveTo(i*cell, 0); ctx.lineTo(i*cell, rows*cell); ctx.stroke(); }
    for (let j = 0; j <= rows; j++) { ctx.beginPath(); ctx.moveTo(0, j*cell); ctx.lineTo(cols*cell, j*cell); ctx.stroke(); }
    // food
    foods.forEach(f => {
      ctx.fillStyle = f.correct ? 'rgba(108,240,192,0.2)' : 'rgba(255,93,122,0.15)';
      ctx.strokeStyle = f.correct ? '#6cf0c0' : '#ff5d7a';
      ctx.lineWidth = 2;
      ctx.fillRect(f.x*cell+2, f.y*cell+2, cell-4, cell-4);
      ctx.strokeRect(f.x*cell+2, f.y*cell+2, cell-4, cell-4);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px "Plus Jakarta Sans", sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(f.val, f.x*cell + cell/2, f.y*cell + cell/2);
    });
    // snake
    snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? '#4ad6ff' : '#6cf0c0';
      ctx.fillRect(s.x*cell+1, s.y*cell+1, cell-2, cell-2);
    });
  }

  requestAnimationFrame(loop);

  window._gameStop = () => { running = false; window.removeEventListener('keydown', kd); };
}

/* ============================================================
   SCRATCHPAD
   ============================================================ */
const SCRATCH = {
  key: null, canvas: null, ctx: null,
  mode: 'pen', color: '#1d2c5e', size: 4,
  drawing: false, lastX: 0, lastY: 0,
  currentStroke: null,
  W: 1000, H: 1000, // normalized coordinate space for persistence
  colors: ['#1d2c5e', '#0a0a0a', '#c0392b', '#1e8449', '#2980b9', '#8e44ad', '#d68910']
};

function scratchHasInk(qKey) {
  const s = state.scratchPads[qKey];
  return !!(s && s.length);
}

function openScratchpad(qKey) {
  SCRATCH.key = qKey;
  const overlay = document.getElementById('scratch-overlay');
  document.getElementById('scratch-q').textContent = qKey;
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden', 'false');

  // Build swatches if not built
  const sw = document.getElementById('scratch-swatches');
  if (!sw.children.length) {
    SCRATCH.colors.forEach((col, i) => {
      const b = document.createElement('button');
      b.className = 'swatch' + (i === 0 ? ' active' : '');
      b.style.background = col;
      b.dataset.color = col;
      b.addEventListener('click', () => {
        SCRATCH.color = col; SCRATCH.mode = 'pen';
        sw.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        b.classList.add('active');
        document.getElementById('tool-pen').classList.add('active');
        document.getElementById('tool-eraser').classList.remove('active');
      });
      sw.appendChild(b);
    });
  }

  initScratchCanvas();
  redrawScratch();

  const hint = document.getElementById('scratch-hint');
  hint.classList.add('show');
  clearTimeout(SCRATCH._hintT);
  SCRATCH._hintT = setTimeout(() => hint.classList.remove('show'), 1800);
}

function closeScratchpad() {
  const overlay = document.getElementById('scratch-overlay');
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
  saveState(); // persist immediately
  // refresh notepad button (badge)
  const btn = document.getElementById('btn-scratch');
  if (btn && SCRATCH.key && scratchHasInk(SCRATCH.key) && !btn.querySelector('.badge')) {
    btn.insertAdjacentHTML('beforeend', '<span class="badge">✏️</span>');
  }
}

function initScratchCanvas() {
  if (SCRATCH._wired) {
    resizeScratchCanvas();
    return;
  }
  const canvas = document.getElementById('scratch-canvas');
  SCRATCH.canvas = canvas;
  SCRATCH.ctx = canvas.getContext('2d');
  resizeScratchCanvas();
  window.addEventListener('resize', resizeScratchCanvas);

  const getPos = (e) => {
    const r = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top, w: r.width, h: r.height };
  };

  const start = (e) => {
    e.preventDefault();
    const p = getPos(e);
    SCRATCH.drawing = true;
    SCRATCH.lastX = p.x; SCRATCH.lastY = p.y;
    SCRATCH.currentStroke = {
      mode: SCRATCH.mode,
      color: SCRATCH.color,
      size: SCRATCH.size,
      points: [[p.x / p.w * SCRATCH.W, p.y / p.h * SCRATCH.H]]
    };
  };
  const move = (e) => {
    if (!SCRATCH.drawing) return;
    e.preventDefault();
    const p = getPos(e);
    drawSegment(SCRATCH.lastX, SCRATCH.lastY, p.x, p.y,
      SCRATCH.currentStroke.color, SCRATCH.currentStroke.size, SCRATCH.currentStroke.mode);
    SCRATCH.currentStroke.points.push([p.x / p.w * SCRATCH.W, p.y / p.h * SCRATCH.H]);
    SCRATCH.lastX = p.x; SCRATCH.lastY = p.y;
  };
  const end = (e) => {
    if (!SCRATCH.drawing) return;
    SCRATCH.drawing = false;
    if (SCRATCH.currentStroke && SCRATCH.currentStroke.points.length) {
      (state.scratchPads[SCRATCH.key] = state.scratchPads[SCRATCH.key] || []).push(SCRATCH.currentStroke);
    }
    SCRATCH.currentStroke = null;
  };

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', end);
  canvas.addEventListener('touchcancel', end);

  document.getElementById('tool-pen').addEventListener('click', () => {
    SCRATCH.mode = 'pen';
    document.getElementById('tool-pen').classList.add('active');
    document.getElementById('tool-eraser').classList.remove('active');
  });
  document.getElementById('tool-eraser').addEventListener('click', () => {
    SCRATCH.mode = 'erase';
    document.getElementById('tool-eraser').classList.add('active');
    document.getElementById('tool-pen').classList.remove('active');
  });
  document.getElementById('tool-undo').addEventListener('click', () => {
    const arr = state.scratchPads[SCRATCH.key];
    if (arr && arr.length) { arr.pop(); redrawScratch(); }
  });
  document.getElementById('tool-clear').addEventListener('click', () => {
    if ((state.scratchPads[SCRATCH.key] || []).length === 0) return;
    if (confirm('Clear this whole page of notes?')) {
      state.scratchPads[SCRATCH.key] = [];
      redrawScratch();
    }
  });
  document.getElementById('tool-close').addEventListener('click', closeScratchpad);

  SCRATCH._wired = true;
}

function resizeScratchCanvas() {
  const c = SCRATCH.canvas; if (!c) return;
  const wrap = c.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  c.width = wrap.width * dpr;
  c.height = wrap.height * dpr;
  SCRATCH.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  SCRATCH.ctx.lineCap = 'round';
  SCRATCH.ctx.lineJoin = 'round';
  redrawScratch();
}

function drawSegment(x1, y1, x2, y2, color, size, mode) {
  const ctx = SCRATCH.ctx;
  if (mode === 'erase') {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.lineWidth = Math.max(size * 6, 24);
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    ctx.restore();
  } else {
    ctx.strokeStyle = color;
    ctx.lineWidth = size;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }
}

function redrawScratch() {
  const c = SCRATCH.canvas, ctx = SCRATCH.ctx; if (!c) return;
  const r = c.getBoundingClientRect();
  ctx.clearRect(0, 0, c.width, c.height);
  const strokes = state.scratchPads[SCRATCH.key] || [];
  strokes.forEach(s => {
    for (let i = 1; i < s.points.length; i++) {
      const a = s.points[i - 1], b = s.points[i];
      drawSegment(
        a[0] / SCRATCH.W * r.width, a[1] / SCRATCH.H * r.height,
        b[0] / SCRATCH.W * r.width, b[1] / SCRATCH.H * r.height,
        s.color, s.size, s.mode
      );
    }
  });
}

/* ============================================================
   SAVE / LOAD (localStorage)
   ============================================================ */
const SAVE_KEY = 'mathquest_princess_save_v1';

function saveState() {
  try {
    const payload = {
      level: state.level,
      xp: state.xp,
      coins: state.coins,
      gems: state.gems,
      coinsEarned: state.coinsEarned,
      bestStreak: state.bestStreak,
      totalCorrect: state.totalCorrect,
      perfectRounds: state.perfectRounds,
      worldBest: state.worldBest,
      mixedBest: state.mixedBest,
      unlockedGames: Array.from(state.unlockedGames),
      unlockedAchievements: Array.from(state.unlockedAchievements),
      gamesPlayed: state.gamesPlayed,
      uniqueGamesPlayed: Array.from(state.uniqueGamesPlayed),
      speedFlag: state.speedFlag,
      powerups: state.powerups,
      weakSpots: state.weakSpots,
      scratchPads: state.scratchPads,
      wardrobe: Array.from(state.wardrobe),
      outfit: state.outfit
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
  } catch (e) { /* sandboxed or storage full — silently skip */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (typeof data.level === 'number') state.level = data.level;
    if (typeof data.xp === 'number') state.xp = data.xp;
    if (typeof data.coins === 'number') state.coins = data.coins;
    if (typeof data.gems === 'number') state.gems = data.gems;
    if (typeof data.coinsEarned === 'number') state.coinsEarned = data.coinsEarned;
    if (typeof data.bestStreak === 'number') state.bestStreak = data.bestStreak;
    if (typeof data.totalCorrect === 'number') state.totalCorrect = data.totalCorrect;
    if (typeof data.perfectRounds === 'number') state.perfectRounds = data.perfectRounds;
    if (data.worldBest && typeof data.worldBest === 'object') state.worldBest = data.worldBest;
    if (typeof data.mixedBest === 'number') state.mixedBest = data.mixedBest;
    if (Array.isArray(data.unlockedGames)) state.unlockedGames = new Set(data.unlockedGames);
    if (Array.isArray(data.unlockedAchievements)) state.unlockedAchievements = new Set(data.unlockedAchievements);
    if (typeof data.gamesPlayed === 'number') state.gamesPlayed = data.gamesPlayed;
    if (Array.isArray(data.uniqueGamesPlayed)) state.uniqueGamesPlayed = new Set(data.uniqueGamesPlayed);
    if (typeof data.speedFlag === 'boolean') state.speedFlag = data.speedFlag;
    if (data.powerups && typeof data.powerups === 'object') {
      state.powerups.fifty = Number(data.powerups.fifty) || 0;
      state.powerups.skip = Number(data.powerups.skip) || 0;
      state.powerups.freeze = Number(data.powerups.freeze) || 0;
    }
    if (data.weakSpots && typeof data.weakSpots === 'object') state.weakSpots = data.weakSpots;
    if (data.scratchPads && typeof data.scratchPads === 'object') state.scratchPads = data.scratchPads;
    if (Array.isArray(data.wardrobe)) {
      // merge so default starter items stay owned
      data.wardrobe.forEach(id => state.wardrobe.add(id));
    }
    if (data.outfit && typeof data.outfit === 'object') {
      Object.keys(state.outfit).forEach(k => {
        if (typeof data.outfit[k] === 'string') state.outfit[k] = data.outfit[k];
      });
    }
    return true;
  } catch (e) { return false; }
}

function resetSave() {
  if (!confirm('Reset all progress? This wipes coins, gems, levels, weak spots, everything.')) return;
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
  location.reload();
}

// Auto-save every 1.5s and on tab close / pagehide
setInterval(saveState, 1500);
window.addEventListener('pagehide', saveState);
window.addEventListener('beforeunload', saveState);

// Boot
loadState();
renderHome('practice');
updateHUD();
</script>
